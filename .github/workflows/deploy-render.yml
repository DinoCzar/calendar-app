name: Deploy to Render

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        if: env.RENDER_DEPLOY_HOOK != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
